<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}UniTools{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    
    <!-- CSS - Ensure file is named style.css inside the static folder -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F2M0H40FX5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-F2M0H40FX5');
    </script>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="/" class="logo">
            <span class="logo-icon">UT</span>
            <span class="logo-text">UniTools</span>
        </a>

        <!-- Hamburger Menu Toggle (Mobile Only) -->
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <!-- Navigation Links -->
        <div class="nav-menu" id="nav-menu">
            <a href="/">Home</a>
            <a href="/pdf-tools">PDF Tools</a>
            <a href="/image-tools">Image Tools</a>
            <a href="/chart-tools">Chart Tools</a>
            <a href="/ai-tools">AI Tools</a>
        </div>

        <!-- Theme Toggle Button -->
        <button id="theme-toggle" class="theme-toggle">🌙</button>
    </nav>

    <!-- Loader Overlay -->
    <div id="loader-overlay" class="loader-overlay">
        <div class="loader"></div>
        <p>Processing, please wait...</p>
    </div>

    <!-- Main Content Area -->
    <div class="main-wrapper">
        {% block content %}{% endblock %}
    </div>

    <!-- JavaScript - Ensure theme.js is in the static folder -->
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
