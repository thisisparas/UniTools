<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UniTools - AI Web Suite{% endblock %}</title>
    
    <!-- CSS Link with Flask url_for to ensure it works on all sub-pages -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F2M0H40FX5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-F2M0H40FX5');
    </script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
<a href="/" class="logo">
    <span class="logo-icon">UT</span>
    <span class="logo-text">UniTools</span>

<div class="nav-center">
    <a href="/">Home</a> <span class="nav-sep">|</span>
    <a href="/pdf-tools">PDF Tools</a> <span class="nav-sep">|</span>
    <a href="/image-tools">Image Tools</a> <span class="nav-sep">|</span>
    <a href="/chart-tools">Chart Tools</a> <span class="nav-sep">|</span>
    <a href="/ai-tools">AI Tools</a>
</div>

    <button id="theme-toggle" class="theme-toggle">🌙</button>
</nav>

<!-- Loader -->
<div id="loader-overlay" class="loader-overlay">
    <div class="loader"></div>
    <p>Processing, please wait...</p>
</div>

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
